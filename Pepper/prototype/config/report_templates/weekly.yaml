weekly_report:
  metadata:
    report_type: "Weekly Report"
    audience:
      - "CSM"
      - "Client"
    objective: "Weekly executive summary with clear CTAs"

  sections:

    - id: executive_summary
      title: "Executive Summary"
      type: "table"
      data_sources:
        - gsc.search_analytics
        - ga4.run_report

    - id: top_pages
      title: "Top Pages"
      type: "table"
      data_sources:
        - gsc.search_analytics
        - ga4.run_report

    - id: deliverables
      title: "Deliverables"
      type: "table"
      data_sources:
        - wordpress.posts
        - webflow.items
        - contentful.entries

    - id: keyword_competitive_matrix
      title: "Competitor Analysis"
      type: "table"
      data_sources:
        - semrush.report

    - id: semrush_ai_performance
      title: "AI Performance"
      type: "table"
      data_sources:
        - semrush_ai.ai_visibility_overview
        - semrush_ai.ai_prompt_mentions
        - semrush_ai.ai_citation_tracking

    - id: url_inspection
      title: "URL Inspection Required"
      type: "table"
      data_sources:
        - gsc.url_inspection

    - id: recommendations
      title: "Recommendations"
      type: "narrative"
      generated_by: "llm"
