monthly_report:
  metadata:
    report_type: "Performance"
    audience:
      - "Marketing Lead"
      - "CMO"
    description: "Performance trends, organic conversion rate, engagement rate"
    cadence:
      - "Monthly"
    objective: "Table-first performance review with concise actions"

  sections:

    - id: executive_snapshot
      title: "Executive Snapshot"
      type: "table"
      data_sources:
        - gsc.search_analytics
        - ga4.run_report
        - semrush.report
        - semrush_ai.ai_visibility_overview

    - id: source_data_tables
      title: "Source Data Tables"
      type: "table_pack"
      data_sources:
        - gsc.search_analytics
        - ga4.run_report
        - semrush.report
        - semrush_ai.ai_visibility_overview
        - semrush_ai.ai_citation_tracking

    - id: cms_and_technical
      title: "CMS and Technical"
      type: "table"
      data_sources:
        - wordpress.posts
        - webflow.items
        - contentful.entries
        - gsc.url_inspection

    - id: insights
      title: "Insights"
      type: "llm_summary"
      generated_by: "llm"

    - id: recommendations
      title: "Recommendations"
      type: "llm_summary"
      generated_by: "llm"
